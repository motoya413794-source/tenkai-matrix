name: Daily Race Scrape

on:
  schedule:
    # 18:30 JST (9:30 UTC) — after afternoon JRA races
    - cron: '30 9 * * *'
    # 22:00 JST (13:00 UTC) — after evening NAR races
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to scrape (YYYYMMDD, default: today JST)'
        required: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -z "$DATE" ]; then
            DATE=$(TZ=Asia/Tokyo date +%Y%m%d)
          fi
          node scripts/scrape.js $DATE

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet || git commit -m "chore: scrape race data $(TZ=Asia/Tokyo date +%Y-%m-%d)"
          git push

      - name: Post to X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -z "$DATE" ]; then
            DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          else
            DATE="${DATE:0:4}-${DATE:4:2}-${DATE:6:2}"
          fi
          node scripts/post-x.js $DATE
