name: Daily Race Scrape

on:
  schedule:
    # 18:30 JST (9:30 UTC) — after afternoon JRA races
    - cron: '30 9 * * *'
    # 22:00 JST (13:00 UTC) — after evening NAR races
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to scrape (YYYYMMDD, default: today JST)'
        required: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -z "$DATE" ]; then
            DATE=$(TZ=Asia/Tokyo date +%Y%m%d)
          fi
          node scripts/scrape.js $DATE

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet || git commit -m "chore: scrape race data $(TZ=Asia/Tokyo date +%Y-%m-%d)"
          git push

      - name: Send email summary
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -z "$DATE" ]; then
            DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          else
            DATE="${DATE:0:4}-${DATE:4:2}-${DATE:6:2}"
          fi
          node scripts/post-x.js $DATE > /tmp/tweet.txt 2>&1 || true
          TWEET=$(grep -A 20 "Tweet preview" /tmp/tweet.txt | grep -v "Tweet preview" | grep -v "chars" | grep -v "credentials")
          node -e "
          const nodemailer = require('nodemailer')
          const fs = require('fs')
          const tweet = fs.readFileSync('/tmp/tweet.txt','utf8').match(/---\n([\s\S]+?)\n---/)?.[1] || '取得失敗'
          const t = nodemailer.createTransport({
            service: 'gmail',
            auth: { user: process.env.GMAIL_USER, pass: process.env.GMAIL_APP_PASSWORD }
          })
          t.sendMail({
            from: process.env.GMAIL_USER,
            to: process.env.GMAIL_USER,
            subject: '🏇 本日のトラックバイアス ツイート文',
            text: tweet + '\n\n---\nこの文をコピーしてXに投稿してください'
          }, (e,i) => { if(e) { console.error(e); process.exit(1) } console.log('Sent:', i.messageId) })
          "
